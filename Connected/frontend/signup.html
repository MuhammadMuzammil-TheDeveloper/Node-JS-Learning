<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up · MaintainIQ</title>
<link rel="stylesheet" href="./style/style.css">
</head>
<body>

<div class="scene">

  <div class="brand">
    <span class="brand-dot"></span>
    <span class="brand-name">Maintain<em>IQ</em></span>
  </div>

  <div class="frame"><i></i>
    <div class="card">
      <p class="eyebrow">Asset Ledger Access</p>
      <h2>Sign Up</h2>
      <p class="sub">Create an account to register assets and start predictive maintenance.</p>

      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your Name">
      </div>

      <div class="field">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="Enter your Age">
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter Email">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter Password">
      </div>

      <button id="signUp" onclick="signUp()">Sign Up</button>

      <p class="switch">Already have an account? <a href="./login.html">Log in</a></p>
    </div>
  </div>

</div>

<script src="./app/app.js"></script>

</body>
</html>
