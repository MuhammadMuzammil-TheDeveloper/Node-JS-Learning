<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · MaintainIQ</title>
<link rel="stylesheet" href="./style/style.css">
</head>
<body>

<div class="scene">

  <div class="brand">
    <span class="brand-dot"></span>
    <span class="brand-name">Maintain<em>IQ</em></span>
  </div>

  <div class="frame"><i></i>
    <div class="card">
      <p class="eyebrow">Asset Ledger Access</p>
      <h2>Login</h2>
      <p class="sub">Sign in to track assets, review issues, and stay ahead of maintenance.</p>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter Email">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter Password">
      </div>

      <button id="login" onclick="login()">Login</button>

      <p class="switch">New to MaintainIQ? <a href="./signup.html">Create an account</a></p>
    </div>
  </div>

</div>

<script src="./app/app.js"></script>

</body>
</html>
